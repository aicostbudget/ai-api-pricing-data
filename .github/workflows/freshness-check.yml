name: Freshness Check

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build generated data
        run: python scripts/build.py
      - name: Generate freshness report
        id: freshness
        continue-on-error: true
        run: python scripts/validate.py --freshness-report --max-age-days 30 --check-urls
      - uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: freshness-report.md
      - name: Open freshness issue
        if: steps.freshness.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("freshness-report.md", "utf8");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Freshness check needs review",
              body
            });

